apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: dr-ec2-nodeclass

spec:
  amiFamily: AL2023
  role: dr-aws-infra-karpenter-node-role

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: dr-aws-infra-eks-cluster

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: dr-aws-infra-eks-cluster

  tags:
    Project: dr-aws-infra
    Environment: dr