---
- name: Install AWS Load Balancer Controller
  hosts: control
  become: false
  vars:
    cluster_name: "dr-aws-infra-eks-cluster"
    aws_region: "ap-northeast-2"
    repo_root: "{{ playbook_dir }}/../.."
    tf_dir: "{{ repo_root }}/terraform"
    kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/config"

  tasks:
    - name: Check AWS identity
      command: aws sts get-caller-identity
      changed_when: false

    - name: Check kubectl cluster access
      command: kubectl cluster-info
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: false

    - name: Read ALB controller role ARN from Terraform output
      command: terraform -chdir={{ tf_dir }} output -raw aws_load_balancer_controller_role_arn
      register: alb_controller_role_arn
      changed_when: false

    - name: Get EKS VPC ID
      command: >
        aws eks describe-cluster
        --name {{ cluster_name }}
        --region {{ aws_region }}
        --query cluster.resourcesVpcConfig.vpcId
        --output text
      register: eks_vpc_id
      changed_when: false

    - name: Add EKS Helm repository
      command: helm repo add eks https://aws.github.io/eks-charts
      register: helm_repo_add
      failed_when: helm_repo_add.rc != 0 and "already exists" not in helm_repo_add.stderr
      changed_when: false

    - name: Update Helm repositories
      command: helm repo update
      changed_when: false

    - name: Create AWS Load Balancer Controller service account manifest
      copy:
        dest: /tmp/aws-load-balancer-controller-sa.yaml
        mode: "0644"
        content: |
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: aws-load-balancer-controller
            namespace: kube-system
            annotations:
              eks.amazonaws.com/role-arn: {{ alb_controller_role_arn.stdout }}

    - name: Apply AWS Load Balancer Controller service account
      command: kubectl apply -f /tmp/aws-load-balancer-controller-sa.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Install AWS Load Balancer Controller using Helm
      command: >
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller
        --version 3.1.0
        -n kube-system
        --set clusterName={{ cluster_name }}
        --set serviceAccount.create=false
        --set serviceAccount.name=aws-load-balancer-controller
        --set region={{ aws_region }}
        --set vpcId={{ eks_vpc_id.stdout }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Apply ingress class manifest
      command: kubectl apply -f {{ repo_root }}/k8s/ingress/ingress-class.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for AWS Load Balancer Controller rollout
      command: kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=180s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: false