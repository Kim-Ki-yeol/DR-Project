---
- name: Install Metrics Server
  hosts: control
  become: false
  vars:
    repo_root: "{{ playbook_dir }}/../.."
    kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/config"

  tasks:
    # Metrics Server 배포
    - name: Apply Metrics Server manifest
      command: >
        kubectl apply -f {{ repo_root }}/k8s/hpa/metrics-server-components.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: false

    # 배포 상태 확인
    - name: Check Metrics Server pods
      command: kubectl get pods -n kube-system -l k8s-app=metrics-server
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: false